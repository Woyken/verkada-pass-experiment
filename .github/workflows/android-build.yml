name: Build Android APK

on:
  push:
    paths:
      - "verkada-pass-app/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Create local.properties
        working-directory: verkada-pass-app
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        working-directory: verkada-pass-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Delete existing release
        run: gh release delete android-latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with APK
        run: |
          gh release create android-latest \
            --title "Latest Android Build" \
            --notes "Built from [\`${GITHUB_SHA::7}\`]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)" \
            --prerelease \
            verkada-pass-app/app/build/outputs/apk/debug/app-debug.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
